<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhaka Spice</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui;padding:16px}
    .signboard{background:#1a1a1a;border-radius:16px;padding:24px;max-width:320px;width:100%;border:2px solid #c0a050;text-align:center}
    .icon{font-size:4rem;display:block;margin-bottom:8px}
    .category{color:#c0a050;font-size:.7rem;text-transform:uppercase;letter-spacing:1px}
    .name{color:#e0e0e0;font-size:1.5rem;font-weight:300;margin:4px 0}
    .desc{color:#888;font-size:.85rem;margin:8px 0}
    .location{color:#666;font-size:.75rem}
    .rating{color:#f5c842;font-size:.9rem;margin:8px 0}
    .btn{display:inline-block;background:#c0a050;color:#0a0a0a;padding:10px 24px;border-radius:40px;text-decoration:none;font-weight:600;font-size:.85rem;margin-top:12px;transition:.2s}
    .btn:hover{background:#d4b86a;transform:scale(1.02)}
    .badge{display:inline-block;background:#c0a050;color:#0a0a0a;font-size:.6rem;font-weight:700;padding:2px 12px;border-radius:20px;margin-top:6px}
  </style>
</head>
<body>
  <div class="signboard">
    <span class="icon">🍽️</span>
    <div class="category">Restaurant</div>
    <div class="name">Dhaka Spice</div>
    <div class="desc">Authentic Bangladeshi cuisine. Try our biryani!</div>
    <div class="location">📍 Dhaka, Bangladesh</div>
    <div class="rating">⭐⭐⭐⭐⭐ 4.8</div>
    <a href="https://example.com/dhaka-spice" class="btn">Visit Shop</a>
    <div class="badge">🛍️ Local Favorite</div>
  </div>
</body>
</html>
